<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add startups</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font: 16px/1.5 system-ui, sans-serif;
        max-width: 32rem;
        margin: 4rem auto;
        padding: 0 1rem;
      }
      .hidden { display: none; }
      .head { display: flex; align-items: baseline; justify-content: space-between; gap: 1rem; }
      h1 { font-size: 1.5rem; margin: 0; }
      form { display: flex; flex-direction: column; gap: 0.5rem; margin: 1.5rem 0; }
      input, textarea { padding: 0.6rem; font: inherit; box-sizing: border-box; width: 100%; }
      textarea { resize: vertical; min-height: 6rem; }
      .hint { font-size: 0.875rem; opacity: 0.7; margin: 0; }
      button { padding: 0.6rem 1rem; font: inherit; cursor: pointer; }
      button[disabled] { opacity: 0.5; cursor: default; }
      .link {
        background: none;
        border: none;
        padding: 0;
        color: inherit;
        opacity: 0.7;
        text-decoration: underline;
      }
      .card { border: 1px solid; border-radius: 0.5rem; padding: 1.25rem; }
      .card label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; }
      .card input { width: 100%; box-sizing: border-box; }
      .actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
      .actions button { flex: 1; }
      #result { padding: 0.75rem; border-left: 3px solid; white-space: pre-line; }
      #result:empty { display: none; }
      .ok { border-color: seagreen; }
      .info { border-color: steelblue; }
      .error { border-color: indianred; }
    </style>
  </head>
  <body>
    <main id="main-view">
      <div class="head">
        <h1>Add startups</h1>
        <button type="button" class="link" id="open-settings">Settings</button>
      </div>
      <form id="form">
        <textarea id="domains" placeholder="acme.com&#10;https://example.io/careers&#10;another.co" autocomplete="off" autofocus required></textarea>
        <p class="hint">One per line, or separated by commas or spaces.</p>
        <button type="submit">Add</button>
      </form>
      <p id="result"></p>
    </main>

    <main id="settings-view" class="hidden">
      <div class="card">
        <h1>Settings</h1>
        <div style="margin-top: 1rem">
          <label for="secret">API secret</label>
          <input id="secret" type="password" placeholder="Enter API secret" autocomplete="off" />
        </div>
        <div class="actions">
          <button type="button" id="save">Save</button>
          <button type="button" id="cancel">Cancel</button>
        </div>
      </div>
    </main>

    <script type="module">
      import { apiFetch, getApiKey, setApiKey } from "./config.js";

      const $ = (id) => document.getElementById(id);
      const mainView = $("main-view");
      const settingsView = $("settings-view");
      const form = $("form");
      const domains = $("domains");
      const secret = $("secret");
      const result = $("result");
      const submit = form.querySelector("button");

      const show = (cls, text) => {
        result.className = cls;
        result.textContent = text;
      };

      const openSettings = () => {
        secret.value = getApiKey();
        mainView.classList.add("hidden");
        settingsView.classList.remove("hidden");
        secret.focus();
      };

      const closeSettings = () => {
        settingsView.classList.add("hidden");
        mainView.classList.remove("hidden");
        domains.focus();
      };

      /** Turns the per-domain results into a short report: counts, then the details. */
      const describe = ({ results, summary }) => {
        const lines = [];
        if (summary.created) lines.push(`Added ${summary.created}.`);
        if (summary.exists) lines.push(`Skipped ${summary.exists} already in the list.`);
        if (summary.invalid) lines.push(`Rejected ${summary.invalid}.`);

        for (const r of results) {
          if (r.status === "exists") lines.push(`• ${r.domain} — already in the list`);
          if (r.status === "invalid") lines.push(`• ${r.error}`);
        }

        const cls = summary.invalid ? "error" : summary.created ? "ok" : "info";
        return [cls, lines.join("\n")];
      };

      $("open-settings").addEventListener("click", openSettings);
      $("cancel").addEventListener("click", closeSettings);
      $("save").addEventListener("click", () => {
        setApiKey(secret.value.trim());
        closeSettings();
        show("info", "API secret saved.");
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!getApiKey()) {
          show("error", "No API secret set — add one in Settings.");
          openSettings();
          return;
        }
        submit.disabled = true;
        show("info", "Adding…");
        try {
          const res = await apiFetch("/startups", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ domains: domains.value }),
          });
          const data = await res.json();
          if (res.status === 401) {
            show("error", "Invalid API secret — check it in Settings.");
          } else if (!res.ok) {
            show("error", data.error ?? "Something went wrong.");
          } else {
            show(...describe(data));
            // Leave the rejected ones in the box so they can be fixed and resubmitted.
            domains.value = data.results
              .filter((r) => r.status === "invalid")
              .map((r) => r.input)
              .join("\n");
          }
        } catch {
          show("error", "Could not reach the server.");
        } finally {
          submit.disabled = false;
        }
      });
    </script>
  </body>
</html>
