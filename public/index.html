<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add a startup</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font: 16px/1.5 system-ui, sans-serif;
        max-width: 32rem;
        margin: 4rem auto;
        padding: 0 1rem;
      }
      .hidden { display: none; }
      .head { display: flex; align-items: baseline; justify-content: space-between; gap: 1rem; }
      h1 { font-size: 1.5rem; margin: 0; }
      form { display: flex; gap: 0.5rem; margin: 1.5rem 0; }
      input { flex: 1; padding: 0.6rem; font: inherit; }
      button { padding: 0.6rem 1rem; font: inherit; cursor: pointer; }
      button[disabled] { opacity: 0.5; cursor: default; }
      .link {
        background: none;
        border: none;
        padding: 0;
        color: inherit;
        opacity: 0.7;
        text-decoration: underline;
      }
      .card { border: 1px solid; border-radius: 0.5rem; padding: 1.25rem; }
      .card label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; }
      .card input { width: 100%; box-sizing: border-box; }
      .actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
      .actions button { flex: 1; }
      #result { padding: 0.75rem; border-left: 3px solid; }
      #result:empty { display: none; }
      .ok { border-color: seagreen; }
      .info { border-color: steelblue; }
      .error { border-color: indianred; }
    </style>
  </head>
  <body>
    <main id="main-view">
      <div class="head">
        <h1>Add a startup</h1>
        <button type="button" class="link" id="open-settings">Settings</button>
      </div>
      <form id="form">
        <input id="domain" placeholder="acme.com" autocomplete="off" autofocus required />
        <button type="submit">Add</button>
      </form>
      <p id="result"></p>
    </main>

    <main id="settings-view" class="hidden">
      <div class="card">
        <h1>Settings</h1>
        <div style="margin-top: 1rem">
          <label for="secret">API secret</label>
          <input id="secret" type="password" placeholder="Enter API secret" autocomplete="off" />
        </div>
        <div class="actions">
          <button type="button" id="save">Save</button>
          <button type="button" id="cancel">Cancel</button>
        </div>
      </div>
    </main>

    <script type="module">
      import { apiFetch, getApiKey, setApiKey } from "./config.js";

      const $ = (id) => document.getElementById(id);
      const mainView = $("main-view");
      const settingsView = $("settings-view");
      const form = $("form");
      const domain = $("domain");
      const secret = $("secret");
      const result = $("result");
      const submit = form.querySelector("button");

      const show = (cls, text) => {
        result.className = cls;
        result.textContent = text;
      };

      const openSettings = () => {
        secret.value = getApiKey();
        mainView.classList.add("hidden");
        settingsView.classList.remove("hidden");
        secret.focus();
      };

      const closeSettings = () => {
        settingsView.classList.add("hidden");
        mainView.classList.remove("hidden");
        domain.focus();
      };

      $("open-settings").addEventListener("click", openSettings);
      $("cancel").addEventListener("click", closeSettings);
      $("save").addEventListener("click", () => {
        setApiKey(secret.value.trim());
        closeSettings();
        show("info", "API secret saved.");
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!getApiKey()) {
          show("error", "No API secret set — add one in Settings.");
          openSettings();
          return;
        }
        submit.disabled = true;
        show("info", "Adding…");
        try {
          const res = await apiFetch("/startups", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ domain: domain.value }),
          });
          const data = await res.json();
          if (res.status === 401) {
            show("error", "Invalid API secret — check it in Settings.");
          } else if (!res.ok) {
            show("error", data.error ?? "Something went wrong.");
          } else if (data.status === "exists") {
            show("info", `${data.domain} is already in the list — skipped.`);
          } else {
            show("ok", `Added ${data.startup.domain}.`);
            domain.value = "";
          }
        } catch {
          show("error", "Could not reach the server.");
        } finally {
          submit.disabled = false;
        }
      });
    </script>
  </body>
</html>
